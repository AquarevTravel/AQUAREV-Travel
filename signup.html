<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AQUAREV Travel - Sign Up</title>
<link rel="icon" href="assets/icons/favicon.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}





body{
font-family:'Poppins',sans-serif;
background:#fff;
min-height:auto;
display:flex;
justify-content:center;
align-items:center;
overflow:auto;
}


.signup-box{
width:80%;
max-width:300px;
background:#fff;
border-radius:10px;
padding:5px 6px;
box-shadow:0 10px 10px rgba(0,0,0,.15);
text-align:center;
}
.logo img{
width:70px;
margin-bottom:08px
}
.signup-box h2{
color:#071426;
font-size:22px;
font: weight 300px;
margin:8px 0 15px;
margin-bottom:25px
}
.input-group{
position:relative;
margin-bottom:5px
}
.input-group i{
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
color:#c29a16
}
.input-group input{
width:100%;
padding:10px 12px;
border-radius:35px;
border:1px solid #ddd;
font-size:15px;
outline:none
}
.input-group input:focus{
border-color:#d4af37;
box-shadow:0 0 10px rgba(212,175,55,.25)
}
.signup-btn{
width:90%;
padding:10px;
border:none;
border-radius:35px;
background:linear-gradient(135deg,#d4af37,#f7e58a);
font-size:16px;
font-weight:700;
cursor:pointer;
color:#071426;
transition:.3s
}
.signup-btn:hover{
transform:translateY(-3px)
}
.divider{
display:flex;
align-items:center;
gap:10px;
margin:25px 0;
color:#777
}
.divider span{
height:8px;
background:#ddd;
flex:1
}
.social-btn{
width:100%;
padding:10px;
border-radius:35px;
border:none;
margin-bottom:12px;
font-size:15px;
font-weight:700;
cursor:pointer;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
transition:.3s
}
.social-btn:hover{
transform:translateY(-3px)
}
.google{
background:#cfb0b0;
border:1px solid #ddd;
color:#333
}
.facebook{
background:#0469ec;
color:#fff
}
.apple{
background:#000000ea;
color:#fff
}
.login-link{
margin-top:18px;
font-size:14px
}
.login-link a{
color:#d4af37;
font-weight:bold;
text-decoration:none
}






.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:-1;
}
</style>
</head>
<body>
<video autoplay muted loop playsinline class="bg-video">
<source src="assets/videos/hero.mp4" type="video/mp4">
</video>




<div class="signup-box">
<div class="logo">
<img src="assets/logo/logo.png" alt="AQUAREV Travel">
</div>
<h2>
<i class="fa-solid fa-user-plus"
 style="color:#d4af37;
 margin-right:8px;"></i>
Créer un compte
</h2>
<form id="signupForm">
<div class="input-group">
<i class="fa-solid fa-user"></i>
<input type="text" id="signupName" placeholder="Nom complet" required>
</div>
<div class="input-group">
<i class="fa-solid fa-envelope"></i>
<input type="email" id="signupEmail" placeholder="Email" required>
</div>
<div class="input-group">
<i class="fa-solid fa-lock"></i>
<input type="password" id="signupPassword" placeholder="Mot de passe" required>
</div>
<div class="input-group">
<i class="fa-solid fa-lock"></i>
<input type="password" id="signupConfirmPassword" placeholder="Confirmer le mot de passe" required>
</div>
<button type="submit" class="signup-btn">
<i class="fa-solid fa-user-check"></i>
Créer mon compte
</button>
</form>
<div class="divider">
<span></span>
OU
<span></span>
</div>
<button type="button" class="social-btn google">
<i class="fa-brands fa-google"></i>
Créer avec Google
</button>
<button type="button" class="social-btn facebook">
<i class="fa-brands fa-facebook-f"></i>
Créer avec Facebook
</button>
<button type="button" class="social-btn apple">
<i class="fa-brands fa-apple"></i>
Créer avec Apple
</button>
<p class="login-link">
Vous avez déjà un compte ?
<a href="signin.html">
Connexion
</a>
</p>
</div>

<script type="module">
import {auth,db} from "./firebase/firebase-config.js";
import {createUserWithEmailAndPassword,GoogleAuthProvider,signInWithPopup} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";
import {doc,setDoc,serverTimestamp} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const signupForm=document.getElementById("signupForm");

signupForm.addEventListener("submit",async(e)=>{
e.preventDefault();

const name=document.getElementById("signupName").value;
const email=document.getElementById("signupEmail").value;
console.log("EMAIL SENT TO FIREBASE:",email);
const password=document.getElementById("signupPassword").value;
const confirmPassword=document.getElementById("signupConfirmPassword").value;

if(password!==confirmPassword){
alert("Les mots de passe ne correspondent pas");
return;
}





try{

const userCredential = await createUserWithEmailAndPassword(
auth,
email,
password
);

const user = userCredential.user;


await setDoc(
doc(db,"users",user.uid),
{
name:name,
email:email,
provider:"Email",
createdAt:serverTimestamp()
}
);


const serverURL = window.location.hostname === "localhost"
? "http://localhost:3000"
: "http://10.123.251.25:3000";


await fetch(`${serverURL}/new-user`,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
name:name,
email:email,
provider:"Email"
})
});


window.location.href="index.html";


}
catch(error){

console.error(error);

alert(error.message);

}

});


const googleButton=document.querySelector(".google");


googleButton.addEventListener("click",async()=>{

try{


const provider=new GoogleAuthProvider();


const result=await signInWithPopup(
auth,
provider
);


const user=result.user;


await setDoc(
doc(db,"users",user.uid),
{
name:user.displayName,
email:user.email,
provider:"Google",
createdAt:serverTimestamp()
},
{
merge:true
}
);



const serverURL = window.location.hostname === "localhost"
? "http://localhost:3000"
: "http://10.123.251.25:3000";


await fetch(`${serverURL}/new-user`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name:user.displayName,
email:user.email,
provider:"Google"
})

});


window.location.href="index.html";


}
catch(error){

console.error(error);

alert(error.message);

}

});


document.querySelector(".facebook").addEventListener("click",()=>{

alert("Facebook Login sera ajouté بعد إعداد Meta Developers");

});


document.querySelector(".apple").addEventListener("click",()=>{

alert("Apple Login sera ajouté لاحقاً");

});









</script>




</body>
</html>
